services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./prisma:/app/prisma      # SQLite file persistence
      - ./logs:/app/logs          # Audit log persistence
    env_file:
      - .env.local
    restart: unless-stopped

  migrate:
    build:
      context: .
      target: migrate
    volumes:
      - ./prisma:/app/prisma
    env_file:
      - .env.local
    profiles:
      - tools
